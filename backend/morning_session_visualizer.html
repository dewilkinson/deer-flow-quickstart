<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobalt | VLI Session Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.5);
            --cobalt-blue: #58a6ff;
            --emerald-green: #3fb950;
            --text-primary: #c9d1d9;
            --text-muted: #8b949e;
            --terminal-green: #39FF14;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--cobalt-blue), var(--emerald-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: calc(100% - 80px);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Terminal Style */
        .terminal {
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            border-radius: 8px;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 13px;
        }

        .terminal-line { margin-bottom: 10px; }
        .prompt { color: var(--emerald-green); }
        .command { color: var(--text-primary); }
        .response { color: var(--cobalt-blue); font-style: italic; margin-left: 20px; }

        /* Vault Explorer */
        .vault-content {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 13px;
            white-space: pre-wrap;
        }

        /* Progress Controls */
        #playback-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: var(--cobalt-blue);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; }

        .audit-card {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid var(--emerald-green);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .simulation-info {
            font-size: 12px;
            color: var(--text-muted);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">COBALT | VLI Session</div>
        <div id="playback-controls">
            <span class="simulation-info" id="step-counter">Step 0 / 0</span>
            <button id="prev-btn" onclick="prevStep()" disabled>PREV</button>
            <button id="next-btn" onclick="nextStep()" disabled>NEXT</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- Command Stream -->
        <div class="card" style="grid-row: span 2;">
            <div class="card-header">VLI Command Stream</div>
            <div class="terminal" id="terminal-pane">
                <div class="terminal-line">[SYSTEM] Ready for Research Session...</div>
            </div>
        </div>

        <!-- Vault State (Watchlists) -->
        <div class="card">
            <div class="card-header">
                Vault State: _cobalt Explorer
                <span id="watchlist-current-name">Daily Picks</span>
            </div>
            <div class="vault-content" id="vault-pane">
                (Simulating State Change...)
            </div>
        </div>

        <!-- Audit & Insights -->
        <div class="card">
            <div class="card-header">Portfolio Manager insights</div>
            <div id="insights-pane" style="overflow-y: auto;">
                 <div style="color: var(--text-muted); text-align: center; margin-top: 40px;">Waiting for qualification steps...</div>
            </div>
        </div>
    </div>

    <script>
        let simulationHistory = [];
        let currentIdx = -1;

        async function loadHistory() {
            try {
                const response = await fetch('simulation_history.json');
                simulationHistory = await response.json();
                document.getElementById('step-counter').innerText = `Step 0 / ${simulationHistory.length}`;
                document.getElementById('next-btn').disabled = false;
            } catch (e) {
                console.error("Failed to load history", e);
            }
        }

        function nextStep() {
            if (currentIdx < simulationHistory.length - 1) {
                currentIdx++;
                updateUI();
            }
        }

        function prevStep() {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        }

        function updateUI() {
            const step = simulationHistory[currentIdx];
            
            // Terminal
            const term = document.getElementById('terminal-pane');
            const newLine = document.createElement('div');
            newLine.className = 'terminal-line';
            newLine.innerHTML = `<span class="prompt">VLI></span> <span class="command">${step.command}</span><br>
                                 <span class="response">${step.reporter_response}</span>`;
            term.appendChild(newLine);
            term.scrollTop = term.scrollHeight;

            // Vault
            const vault = document.getElementById('vault-pane');
            // Show the first available watchlist for simplicity, or specific one
            const watchlistKey = Object.keys(step.vault_snapshot).find(k => k.startsWith('watchlist_')) || 'watchlist';
            vault.innerText = step.vault_snapshot[watchlistKey] || "(No current watchlist state)";

            // Insights
            const insights = document.getElementById('insights-pane');
            insights.innerHTML = `<div><strong>Coordinator Thought:</strong><br><em style="font-size: 13px;">${step.agent_thought}</em></div>`;
            
            if (step.command.toLowerCase().includes('audit')) {
                insights.innerHTML += `<div class="audit-card"><strong>Batch Suitability Audit</strong><br>${step.reporter_response}</div>`;
            }

            // Controls
            document.getElementById('step-counter').innerText = `Step ${currentIdx + 1} / ${simulationHistory.length}`;
            document.getElementById('prev-btn').disabled = currentIdx <= 0;
            document.getElementById('next-btn').disabled = currentIdx >= simulationHistory.length - 1;
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
