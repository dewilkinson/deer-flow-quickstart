line-length = 240
target-version = "py312"

[lint]
select = ["E", "F", "I", "UP"]
ignore = [
    "E402",  # Module level import not at top of file (allow lazy loading pattern)
    "E731",  # Do not assign a lambda expression, use a def (common in this codebase)
    "F401",  # Unused imports (legacy errors in existing files)
    "F841",  # Unused variables (legacy errors)
    "E501",  # Line too long (to accommodate existing long lines)
    "I001",  # Import sorting (legacy unorganized imports)
    "E722",  # Bare except (legacy errors)
    "F811",  # Redefinition (legacy errors)
    "F821",  # Undefined name (legacy errors)
    "F403",  # Star import (legacy errors)
    "E741",  # Ambiguous variable name (legacy errors)
    "UP",    # Upgrade rules (legacy errors like str-enum inheritance)
]

[lint.isort]
known-first-party = ["deerflow", "app"]

[format]
quote-style = "double"
indent-style = "space"
