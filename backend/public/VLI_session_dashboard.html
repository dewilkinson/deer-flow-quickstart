<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobalt | VLI Command Center</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --cobalt-deep: #0a0c10;
            --cobalt-blue: #58a6ff;
            --emerald-green: #3fb950;
            --ruby-red: #f85149;
            --glass-bg: rgba(13, 17, 23, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e6edf3;
            --text-muted: #8b949e;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Inter', monospace;
            --price-up: #3fb950;
            --price-down: #f85149;
            --amber-gold: #d29922;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--cobalt-deep);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden !important;
            /* Rigid No-Scroll */
            background: radial-gradient(circle at 50% -20%, #161b22 0%, #0a0c10 100%);
        }

        /* --- DASHBOARD GRID --- */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 475px;
            /* CI Sidebar expanded to 475px */
            height: 100vh;
            gap: 1.5px;
            /* Sharp spacing */
            background: var(--card-border);
        }

        .grid-left {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 5fr 1fr;
            gap: 15px;
            padding: 20px;
            overflow: hidden;
            background: var(--cobalt-deep);
        }

        .grid-right {
            background: #0d1117;
            border-left: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- CARDS & UI COMPONENTS --- */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .card-header {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .card-body {
            padding: 15px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            height: 100%;
            width: 100%;
        }

        /* HUD Badges */
        .live-badge {
            background: rgba(63, 185, 80, 0.15);
            color: var(--emerald-green);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 800;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .descriptor {
            width: 24px;
            height: 24px;
            background: var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            color: var(--cobalt-blue);
        }

        /* Tables & Lists */
        .macro-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .macro-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 10px;
            padding-bottom: 8px;
        }

        .macro-table td {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .symbol-bold {
            font-weight: 700;
            color: #fff;
        }

        .val-mono {
            font-family: var(--font-mono);
            font-weight: 400 !important;
        }

        /* CI CHAT - Terminal Reformat */
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 95%;
            padding: 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .msg-ai {
            background: rgba(13, 17, 23, 0.98);
            color: var(--text-primary);
            font-weight: 400;
            align-self: flex-start;
            border-left: 4px solid var(--emerald-green);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            /* Increased from 14px */
            border-right: 1px dashed rgba(63, 185, 80, 0.1);
            border-top: 1px dashed rgba(63, 185, 80, 0.1);
            border-bottom: 1px dashed rgba(63, 185, 80, 0.1);
        }

        .msg-ai h1,
        .msg-ai h2,
        .msg-ai h3 {
            color: var(--emerald-green);
            font-family: 'Outfit', sans-serif;
            font-size: 13pt;
            margin: 15px 0 8px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(63, 185, 80, 0.15);
            padding-bottom: 4px;
        }

        .msg-ai strong {
            color: var(--emerald-green);
            font-weight: 400;
        }

        .msg-ai code {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 5px;
            border-radius: 4px;
            color: var(--emerald-green);
        }

        .msg-ai ul {
            margin-left: 20px;
            margin-bottom: 10px;
            list-style-type: square;
        }

        .msg-ai li {
            margin-bottom: 4px;
            font-weight: 400;
        }

        .msg-user {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            align-self: flex-end;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .analysis-report pre {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: var(--font-mono);
            font-size: 15px;
            /* Increased from 13px */
            color: #c9d1d9;
            margin: 10px 0;
            scrollbar-width: thin;
        }

        .analysis-report pre::-webkit-scrollbar {
            height: 6px;
        }

        .analysis-report pre::-webkit-scrollbar-thumb {
            background: rgba(88, 166, 255, 0.5);
            border-radius: 3px;
        }

        .analysis-report code {
            font-family: var(--font-mono);
            color: #79c0ff;
        }

        /* INPUT PANEL */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--card-border);
        }

        .gemini-panel {
            background: rgba(30, 35, 45, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #chat-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--font-main);
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 60px;
        }

        .panel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .media-btn {
            color: var(--cobalt-blue);
            font-size: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
        }

        .control-select {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        .dropdown-arrow {
            font-size: 8px;
            color: var(--text-muted);
            margin-left: 4px;
            pointer-events: none;
        }

        .send-btn {
            background: rgba(88, 166, 255, 0.2);
            color: var(--cobalt-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(88, 166, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .send-btn.processing {
            background: rgba(248, 81, 73, 0.2);
            color: var(--ruby-red);
            border-radius: 4px;
            /* Square for Stop */
            border-color: rgba(248, 81, 73, 0.4);
        }

        .send-btn.processing::after {
            content: '';
            width: 12px;
            height: 12px;
            background: currentColor;
            border-radius: 2px;
        }

        .send-btn:hover {
            background: var(--cobalt-blue);
            color: #fff;
        }

        .send-btn.processing:hover {
            background: var(--ruby-red);
            color: #fff;
        }

        /* TELEMETRY TAIL */
        .terminal {
            font-family: var(--font-mono);
            font-size: 11.5pt;
            /* Increased from 10pt */
            background: #05070a;
            color: #d1d5db;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            border-left: 2px solid rgba(88, 166, 255, 0.3);
            overflow-y: auto !important;
            scrollbar-width: thin !important;
            scrollbar-color: var(--cobalt-blue) #05070a !important;
        }

        .terminal::-webkit-scrollbar {
            width: 6px !important;
        }

        .terminal::-webkit-scrollbar-track {
            background: #05070a !important;
        }

        .terminal::-webkit-scrollbar-thumb {
            background: var(--cobalt-blue) !important;
            border-radius: 3px !important;
        }

        .terminal h1,
        .terminal h2,
        .terminal h3 {
            color: var(--cobalt-blue);
            font-size: 11pt;
            margin: 12px 0 6px 0;
            letter-spacing: 0.5px;
        }

        .terminal p {
            margin-bottom: 6px;
        }

        .terminal ul {
            margin-left: 18px;
            margin-bottom: 8px;
            list-style-type: square;
        }

        .terminal strong {
            color: #fff;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.2);
        }

        /* Error Overlay */
        #error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 81, 73, 0.1);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-weight: 800;
            color: var(--ruby-red);
        }

        /* --- TOGGLE SWITCH --- */
        .direct-mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .direct-mode-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .direct-mode-toggle.active {
            border-color: rgba(88, 166, 255, 0.4);
            background: rgba(88, 166, 255, 0.1);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.1);
        }

        .direct-mode-toggle .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.2s ease;
        }

        .direct-mode-toggle.active .dot {
            background: var(--cobalt-blue);
            box-shadow: 0 0 5px var(--cobalt-blue);
        }

        .direct-mode-toggle .label {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .direct-mode-toggle.active .label {
            color: var(--ruby-red);
        }

        .direct-mode-toggle.on {
            border-color: rgba(63, 185, 80, 0.4);
            background: rgba(63, 185, 80, 0.1);
        }

        .direct-mode-toggle.on .dot {
            background: var(--emerald-green);
            box-shadow: 0 0 5px var(--emerald-green);
        }

        .direct-mode-toggle.on .label {
            color: var(--emerald-green);
        }

        .direct-mode-toggle.off {
            border-color: rgba(248, 81, 73, 0.4);
            background: rgba(248, 81, 73, 0.1);
        }

        .direct-mode-toggle.off .dot {
            background: var(--ruby-red);
            box-shadow: 0 0 5px var(--ruby-red);
        }

        .direct-mode-toggle.off .label {
            color: var(--ruby-red);
        }

        /* --- ANALYSIS DOCUMENT VIEWER --- */
        .analysis-report {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            color: var(--text-primary);
            line-height: 1.45;
            padding: 18px;
            font-weight: 400;
            text-rendering: optimizeLegibility;
        }

        .analysis-report p {
            margin-bottom: 16px;
            text-align: justify;
            hyphens: auto;
        }

        .analysis-report ul,
        .analysis-report ol {
            margin-bottom: 20px;
            margin-left: 20px;
        }

        .analysis-report li {
            margin-bottom: 10px;
            text-align: justify;
        }

        .analysis-report h1,
        .analysis-report h2,
        .analysis-report h3 {
            color: var(--emerald-green);
            font-family: 'Outfit', sans-serif;
            margin-top: 25px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(63, 185, 80, 0.1);
            padding-bottom: 5px;
        }

        .analysis-report strong {
            color: var(--emerald-green);
            font-weight: 700;
        }

        .analysis-report blockquote {
            border-left: 4px solid var(--emerald-green);
            background: rgba(63, 185, 80, 0.05);
            padding: 15px;
            margin: 20px 0;
            font-style: italic;
            border-radius: 0 8px 8px 0;
        }

        .analysis-report table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            font-size: 13px;
        }

        .analysis-report th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            text-align: left;
            color: var(--emerald-green);
            font-family: 'Outfit';
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .analysis-report td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .analysis-report hr {
            border: none;
            border-bottom: 1px solid var(--card-border);
            margin: 30px 0;
        }

        /* Custom Dark Scrollbar */
        .terminal::-webkit-scrollbar,
        .analysis-report-body::-webkit-scrollbar {
            width: 6px;
        }

        .terminal::-webkit-scrollbar-track,
        .analysis-report-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .terminal::-webkit-scrollbar-thumb,
        .analysis-report-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .terminal::-webkit-scrollbar-thumb:hover,
        .analysis-report-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>
    <!-- Error Overlay disabled to prevent layout integrity locks during audit sessions -->
    <!-- <div id="error-overlay">...</div> -->

    <div class="dashboard-container">
        <div class="grid-left" id="operational-grid">


            <div class="card" style="grid-column: 1;" data-ux-type-guid="3fb8c801-443b-466d-888e-64d559868661"
                data-ux-instance-guid="de1ef310-8588-4e89-9852-789a71465241">
                <div class="card-header">
                    <div>RAW TELEMETRY TAIL <span class="live-badge">LIVE</span></div>
                    <span class="descriptor" id="rt-btn" onclick="resetVLI()"
                        title="Reset Session (Hard Kill)">RT</span>
                </div>
                <div class="card-body terminal" id="telemetry-body"></div>
            </div>

            <!-- New Macro Watchlist Transit Card -->
            <div class="card" style="grid-column: 2;" data-ux-type-guid="5a06587c-6950-4ff6-8367-7389148d2873"
                data-ux-instance-guid="f3e5b3b0-681e-4c7b-891a-3e5f29c8e8d5">
                <div class="card-header">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div>MACRO WATCHLIST <span class="live-badge">LIVE</span></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="descriptor">MW</span>
                    </div>
                </div>
                <div class="card-body" style="overflow-y: hidden;">
                    <table class="macro-table" style="width: 100%;">
                        <thead>
                            <tr style="font-size: 14px; letter-spacing: 2px;">
                                <th style="padding-bottom: 15px; text-align: left;">TICKER</th>
                                <th style="padding-bottom: 15px; text-align: left;">PRICE</th>
                                <th style="padding-bottom: 15px; text-align: left;">CHANGE</th>
                                <th style="padding-bottom: 15px; text-align: left;">SORTINO</th>
                                <th style="padding-bottom: 15px; text-align: left;">TREND (5M)</th>
                            </tr>
                        </thead>
                        <tbody id="macro-watchlist-body" style="font-size: 15px;">
                            <tr>
                                <td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">
                                    Awaiting Data</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 3. Analysis Report (Technical Document Viewer) -->
            <div class="card" style="grid-column: 1 / span 2;" data-ux-type-guid="8c4f9a2e-3d71-4b10-9c2b-e9d6c35c4a17"
                data-ux-instance-guid="7a1d9c5e-8b4e-4f3d-9a2c-d5e6f7a8b9c0">
                <div class="card-header">
                    <div>ANALYSIS REPORT</div>
                    <span class="descriptor">AR</span>
                </div>
                <div class="card-body terminal analysis-report-body" id="analysis-report-viewer">
                    <div style="color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 40px;">
                        Awaiting Results</div>
                </div>
            </div>
        </div>

        <!-- COORDINATOR INTERFACE -->
        <div class="grid-right" data-ux-type-guid="a1b2c3d4-e5f6-4a5b-bcde-f1e2d3c4b5a6"
            data-ux-instance-guid="b6a5c4d3-e2f1-4b5a-9d8c-7f6e5d4c3b2a">
            <div class="card-header" style="background:transparent; border-bottom:1px solid var(--card-border);">
                <div style="display:flex; align-items:center; gap:8px;">
                    <div class="led-small led-green"></div>
                    <div>COORDINATOR INTERFACE</div>
                    <span class="live-badge" id="conn-status"
                        style="margin-left:5px; background: rgba(63, 185, 80, 0.15); color: var(--emerald-green);">LIVE</span>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="async-mode-btn" class="direct-mode-toggle off" onclick="toggleAsyncMode()"
                        title="Toggle Background Deep Synthesis" style="display: none;">
                        <div class="dot"></div>
                        <span class="label">ASYNC REPORT: OFF</span>
                    </div>
                    <div id="direct-mode-btn" class="direct-mode-toggle on" onclick="toggleDirectMode()">
                        <div class="dot"></div>
                        <span class="label">COBALT AI: ON</span>
                    </div>
                    <span class="descriptor">CI</span>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg msg-ai"><strong>VLI</strong> initialized. Awaiting market directives or Action Plan
                    updates.</div>
            </div>
            <div class="input-area">
                <div class="gemini-panel">
                    <textarea id="chat-input" placeholder="Enter directive or $TICKER analysis..."></textarea>
                    <div class="panel-controls">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="media-btn">+</div>

                            <div class="control-group">
                                <select class="control-select">
                                    <option selected>Thinking</option>
                                    <option>Fast</option>

                                <span class="dropdown-arrow">▼</span>

                            <div class="control-group" style="margin-left: 5px;">
                                <select class="control-select">
                                    <option selected>Gemini 3 Flash</option>
                                    <option>Gemini 3 Pro</option>
                                    <option>Claude 3.5 Sonnet</option>
                                </select>
                                <span class="dropdown-arrow">▼</span>
                            </div>

                        <div class="send-btn" id="send-stop-btn" onclick="handleSendStop()">➤</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let refreshCountdown = 60;
        async function resetVLI() {
            const rtBtn = document.getElementById('rt-btn');
            rtBtn.style.color = 'var(--ruby-red)';
            rtBtn.innerText = '--';

            try {
                const response = await fetch('/api/vli/reset', { method: 'POST' });
                if (response.ok) {
                    document.getElementById('telemetry-body').innerHTML = '<div class="log-entry">SYSTEM_NODE: RESET SIGNAL SENT SUCCESSFULLY.</div>';
                    document.getElementById('telemetry-body').dataset.lastContent = ""; // Reset cache
                    document.getElementById('chat-messages').innerHTML = '';
                    document.getElementById('analysis-report-viewer').innerHTML = '<div style="display: flex; height: 100%; align-items: center; justify-content: center; color: var(--text-muted); font-family: Outfit; font-weight: 200; letter-spacing: 2px;">VLI_REPORT_STANDBY</div>';
                    document.getElementById('analysis-report-viewer').dataset.lastReport = "";
                    poll();
                }
            } catch (err) {
                console.error("VLI Reset Error:", err);
            } finally {
                setTimeout(() => {
                    rtBtn.style.color = '';
                    rtBtn.innerText = 'RT';
                }, 1000);
            }
        }

        let directMode = false;
        let lastVliThreadId = null;

        const sessionArtifacts = {};

        function drawSparkline(values, ticker = null) {
            if (!values || values.length < 2) return '';

            const validValues = values.filter(v => v !== null);
            if (validValues.length === 0) return '';

            const min = Math.min(...validValues);
            const max = Math.max(...validValues);
            const range = (max - min) || 1;
            const width = 64;
            const height = 16;

            const points = values.map((v, i) => {
                const x = (i / (values.length - 1)) * width;
                const y = v !== null ? height - ((v - min) / range) * height : null;
                return { x, y };
            });

            // Filter out null points for drawing
            const pathData = points.filter(p => p.y !== null).map((p, i) => {
                return `${i === 0 ? 'M' : 'L'} ${p.x},${p.y}`;
            }).join(' ');

            const isUp = validValues[validValues.length - 1] >= validValues[0];
            const color = isUp ? '#34d399' : '#fb7185';

            return `
                <div style="width: 64px; height: 16px; display: flex; align-items: center;">
                    <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="overflow:visible; display: block;" data-ticker="${ticker}">
                        <path d="${pathData}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 4px ${color}66);" />
                    </svg>
                </div>
            `;
        }

        function applyStatusFormatting(html) {
            // Wrap in span to ensure all text nodes are bracketed by > and <
            let processed = `<span>${html}</span>`;

            processed = processed.replace(/>([^<]+)</g, (match, innerText) => {
                let text = innerText;

                // Color values: +val (Dark Green), -val (Dark Red), val (White)
                text = text.replace(/(^|\s|\[|\()([+-]?)(\$?\d+(?:,\d+)*(?:\.\d+)?(?:[kKmMbBtT%])?)(?=[.,;!?\])]*(?:\s|$))/g, (m, prefix, sign, val) => {
                    let color = '#ffffff'; // bold white default
                    if (sign === '+') {
                        color = '#2ea043'; // darker green
                    } else if (sign === '-') {
                        color = '#d73a49'; // darker red
                    }
                    return `${prefix}<span style="color: ${color}; font-weight: 400;">${sign}${val}</span>`;
                });

                // Status Keywords
                text = text.replace(/\b(HALT|DENIED|STOP|REJECTED|ABORT|FAILED)\b/g, '<span style="color: var(--ruby-red); font-weight: 400;">$&</span>');
                text = text.replace(/\b(WAIT|HOLD|PENDING|WARNING)\b/g, '<span style="color: var(--amber-gold); font-weight: 400;">$&</span>');
                text = text.replace(/\b(APPROVED|PROCEED|AUTHORIZE|GO|SUCCESS|RESOLVED|PASSED)\b/g, '<span style="color: var(--emerald-green); font-weight: 400;">$&</span>');

                return `>${text}<`;
            });

            // Remove the wrapping <span></span> (7 chars at start, 7 chars at end)
            return processed.substring(6, processed.length - 7);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            // Push to history
            chatHistory.push(text);
            historyIndex = chatHistory.length;

            const btn = document.getElementById('send-stop-btn');
            btn.innerText = "";
            btn.classList.add('processing');
            isProcessing = true;

            const msgBox = document.getElementById('chat-messages');
            const userMsg = document.createElement('div');
            userMsg.className = 'msg msg-user';
            userMsg.innerHTML = applyStatusFormatting(marked.parse(text));
            msgBox.appendChild(userMsg);

            input.value = '';

            // Render Math for the user message
            renderMathInElement(userMsg, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true }

                    if (!targetCard) targetCard = "ALL";
                    console.log("[VLI_TRACE] " + new Date().toLocaleTimeString() + " - Intercepting UX refresh command for: " + targetCard);

                        method: 'POST',

                    btn.innerText = "➤";

                let rawDataMode = false;

                    rawDataMode = true;
                    requestText = text.replace(/--raw/ig, "").trim();
                }

                console.log("[VLI_TRACE] " + new Date().toLocaleTimeString() + " - Submitting command to backend: " + requestText);
                const startTime = performance.now();
                const res = await fetch('/api/vli/action-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: requestText,
                        direct_mode: directMode,
                        raw_data_mode: rawDataMode,
                        background_synthesis: asyncMode,
                        thread_id: lastVliThreadId
                    })
                });
                const data = await res.json();
                if (data.thread_id) {
                    lastVliThreadId = data.thread_id;
                    console.log("[VLI_TRACE] Session thread pinned: " + lastVliThreadId);
                }
                const durationSec = ((performance.now() - startTime) / 1000).toFixed(2);
                console.log("[VLI_TRACE] " + new Date().toLocaleTimeString() + ` - Command response received in ${durationSec}s.`);

                if (isProcessing) {

                            sessionArtifacts[artifactId] = responseText;
                            aiMsg.innerHTML = `<strong>[HEADLESS DATA ENGINE - RAW JSON]:</strong><br>Returned <a href="${url}" download="vli_raw_payload.json" onclick="renderArtifactToReport(event, '${artifactId}')" ondblclick="openNativeNotepad('vli_raw_payload.json')" style="color: #e5e7eb; font-weight: 700; text-decoration: underline; background: rgba(128, 128, 128, 0.25); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 10px; cursor: pointer;">vli_raw_payload.json</a><div style="font-size:10px; color:var(--text-muted); margin-top:8px;">⏱️ Latency: ${durationSec}s</div>`;
                        } catch (e) {
                            aiMsg.innerHTML = `<strong>[HEADLESS DATA ENGINE - RAW JSON]:</strong> Data array returned successfully.<div style="font-size:10px; color:var(--text-muted); margin-top:8px;">⏱️ Latency: ${durationSec}s</div>`;

                        let cleanText = responseText;
                        const isLeak = leakKeywords.some(k => cleanText.toUpperCase().includes(k)) || cleanText.toUpperCase().includes("STRUCTURAL_EXCEPTION") || cleanText.includes("Integrity check failed");
                        const isQuota = cleanText.toUpperCase().includes("QUOTA_EXHAUSTED") || cleanText.toUpperCase().includes("RESOURCE_EXHAUSTED") || cleanText.toUpperCase().includes("RATE_LIMIT");
                        const isFallback = isLeak || isQuota || cleanText.toUpperCase().includes("INSTITUTIONAL PROCESSING RECOVERY");

                        // [SECURITY] Catch Fallback Message
                        if (isFallback) {
                            const warnMsg = document.createElement('div');
                            warnMsg.className = 'msg msg-ai';
                            warnMsg.style.borderLeftColor = isQuota ? '#ff9d00' : '#fdbd33';

                            let matchedModel = "Gemini 3 Pro";
                            const match = cleanText.match(/(?:Quota limit reached for|Tier .*? failed).*?([a-z0-9.-]*?gemini-[a-z0-9.-]+)/i);
                            if (match) {
                                matchedModel = match[1].replace(/[()]/g, '').trim();
                                if (matchedModel.includes("gemini-3")) matchedModel = matchedModel.includes("pro") ? "Gemini 3 Pro" : "Gemini 3 Flash";
                            } else if (cleanText.includes("gemini-3-pro")) {
                                matchedModel = "Gemini 3 Pro";
                            } else if (cleanText.includes("gemini-3-flash") || cleanText.includes("basic")) {
                                matchedModel = "Gemini 3 Flash";
                            }

                            const errorType = isQuota ? "API Quota Limit Reached" : "Structural Exception Detected";
                            const errorDetail = isQuota ? "throtled" : "generated a payload that violated internal security schemas";

                            warnMsg.innerHTML = `<span style="color: ${isQuota ? '#ff9d00' : '#fdbd33'}; font-weight: normal;">⚠️ <strong>${errorType}:</strong> <span style="color: white; font-family: 'Courier New', Courier, monospace; font-weight: bold;">${matchedModel}</span> ${errorDetail}. Managed recovery active.</span>`;
                            msgBox.appendChild(warnMsg);

                            // Strip internal fallback wrapper from the response if present 
                            const preIdx = cleanText.lastIndexOf("Falling back to");
                            if (preIdx !== -1) {
                                let startAnalysis = cleanText.indexOf("\n", preIdx);
                                if (startAnalysis !== -1) {
                                    cleanText = cleanText.substring(startAnalysis).trim();
                                }
                            }

                            // Stop if it was an unrecoverable leak
                            if (leakKeywords.some(k => cleanText.toUpperCase().includes(k)) && !cleanText.toUpperCase().includes("STRUCTURAL_EXCEPTION")) {
                                msgBox.scrollTop = msgBox.scrollHeight;
                                return;
                            }

                            // [NEW] Inject persistent warning at the top of the generated report
                            const fallbackLabel = isQuota ? "Quota limits" : "structural integrity checks";
                            cleanText = `<div style="border-left: 4px solid var(--amber-gold); padding: 12px 16px; margin-bottom: 20px; background: rgba(210, 153, 34, 0.08); border-radius: 4px;"><span style="color: var(--amber-gold); font-weight: normal;">⚠️ <strong>Fallback Mode Active:</strong> Due to ${fallbackLabel}, this analysis was generated by a lower-tier model. The accuracy and depth of results may be compromised.</span></div>\n\n` + cleanText;

                        // [UX_REFINEMENT] Detect short vs long responses
                        // A short response is a single paragraph without structural Markdown headers, tables, or lists.
                        const isShort = !cleanText.includes('###') &&
                            !cleanText.includes('|') &&
                            !cleanText.includes('\n* ') &&
                            !cleanText.includes('\n- ') &&
                            cleanText.trim().split(/\n\s*\n/).length <= 1 &&
                            cleanText.length < 600;

                        if (!isShort) {
                            // [NEW] Mirror long-form analysis to the persistent Report Card
                            const reportViewer = document.getElementById('analysis-report-viewer');
                            reportViewer.innerHTML = `<div class="analysis-report">${applyStatusFormatting(marked.parse(cleanText))}</div>`;
                            reportViewer.scrollTop = 0;

                            try {
                                renderMathInElement(reportViewer, {
                                    delimiters: [
                                        { left: '$$', right: '$$', display: true },
                                        { left: '$', right: '$', display: false },
                                        { left: '\\(', right: '\\)', display: false },
                                        { left: '\\[', right: '\\]', display: true }
                                    ]
                                });
                            } catch (e) { console.error("KaTeX Report Error:", e); }

                            // Determine file suffix
                            let suffix = "md";
                            const txtTrim = cleanText.trim();
                            if (txtTrim.startsWith('{') || txtTrim.startsWith('[')) { suffix = "json"; }
                            else if (txtTrim.toLowerCase().includes('<html') || txtTrim.toLowerCase().includes('<div')) { suffix = "html"; }

                            // Generate safe filename from request text
                            let baseName = "vli_report";
                            if (requestText) {
                                baseName = requestText.trim().replace(/[^a-zA-Z0-9\s]/g, '').trim().replace(/\s+/g, '_').substring(0, 25).toLowerCase();
                                if (!baseName) baseName = "vli_report";
                            }
                            const filename = `${baseName}.${suffix}`;

                            // Generate Blob for download link
                            const mimeType = suffix === 'json' ? 'application/json' : suffix === 'html' ? 'text/html' : 'text/markdown';
                            const blob = new Blob([cleanText], { type: mimeType });
                            const url = URL.createObjectURL(blob);

                            const artifactId = 'artifact_' + Date.now() + Math.floor(Math.random() * 1000);
                            sessionArtifacts[artifactId] = cleanText;

                            // Keep Chat completely clean with just the file link redirect
                            aiMsg.innerHTML = `<strong>Analysis posted to Reports window.</strong><br>Returned: <a href="${url}" download="${filename}" onclick="renderArtifactToReport(event, '${artifactId}')" ondblclick="openNativeNotepad('${filename}')" style="color: #e5e7eb; font-weight: 700; text-decoration: underline; background: rgba(128, 128, 128, 0.25); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 10px; cursor: pointer;">${filename}</a><div style="font-size:10px; color:var(--text-muted); margin-top:8px;">⏱️ Latency: ${durationSec}s</div>`;
                        } else {
                            // Inline rendering for single-paragraph responses
                            aiMsg.innerHTML = applyStatusFormatting(marked.parse(cleanText)) + `<div style="font-size:10px; color:var(--text-muted); margin-top:8px;">⏱️ Latency: ${durationSec}s</div>`;
                        }
                    } // close else

                    msgBox.appendChild(aiMsg);

                    // Render Math for the AI message response
                    renderMathInElement(aiMsg, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\(', right: '\\)', display: false },
                            { left: '\\[', right: '\\]', display: true }
                        ]
                    });

                    msgBox.scrollTop = msgBox.scrollHeight;
                }
            } catch (e) {
                if (isProcessing) {
                    const errMsg = document.createElement('div');
                    errMsg.className = 'msg msg-ai';
                    errMsg.style.borderColor = 'var(--ruby-red)';
                    errMsg.innerHTML = "<strong>ERROR:</strong> Directive routing failed. Remote service unreachable.";
                    msgBox.appendChild(errMsg);
                }
            } finally {
                btn.innerText = "➤";
                btn.classList.remove('processing');
                isProcessing = false;
            }
        }

        // [V10.4] Synchronization with Background Scraper
        (async () => {
            const macroCard = document.querySelector('.card[style*="display: none"]');
            const state = macroCard ? "off" : "on";
            try {
                await fetch(`/api/vli/macro/toggle/${state}`, { method: 'POST' });
            } catch (e) { }
        })();

        setInterval(poll, 5000);

        // [STABILITY] Force-inject the VERIFY button if the header was overwritten
        setTimeout(() => {
            const header = document.querySelector('.card-header:contains("MACRO WATCHLIST")') || document.querySelector('.card:nth-child(2) .card-header');
            if (header && !document.getElementById('verify-audit-btn')) {
                const btnContainer = document.createElement('div');
                btnContainer.style.display = 'flex';
                btnContainer.style.alignItems = 'center';
                btnContainer.style.gap = '8px';
                btnContainer.innerHTML = `
                    <button id="verify-audit-btn" onclick="runSparklineAudit()" 
                            style="background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.4); 
                            color: var(--cobalt-blue); font-size: 9px; padding: 2px 6px; border-radius: 4px; 
                            cursor: pointer; font-weight: 700; letter-spacing: 0.5px;">VERIFY</button>
                `;
                header.appendChild(btnContainer);
            }
        }, 1000);
        poll();

        let chatHistory = [];
        let historyIndex = -1;

        // [UX] Single Enter to Submit (Shift+Enter for newline) + History Navigation
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (isProcessing) return; // [FIX] Prevent accidental cancels via keyboard
                handleSendStop();
            } else if (e.key === 'ArrowUp') {
                if (chatHistory.length > 0 && historyIndex > 0) {
                    historyIndex--;
                    e.target.value = chatHistory[historyIndex];
                    e.preventDefault();
                }
            } else if (e.key === 'ArrowDown') {
                if (chatHistory.length > 0 && historyIndex < chatHistory.length) {
                    historyIndex++;
                    if (historyIndex === chatHistory.length) {
                        e.target.value = '';
                    } else {
                        e.target.value = chatHistory[historyIndex];
                    }
                    e.preventDefault();
                }
            }
        });
    </script>
</body>

</html>
